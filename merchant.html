<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Merchant - QR check</title>
    <link rel="stylesheet" href="css/merchant.css">
    <!-- QR létrehozás -->
    <script src="static/qrious.min.js"></script>
    <!-- QR olvasó lib (kamera) -->
    <script src="static/html5-qrcode.min.js"></script>
</head>
<body>
    <h2>Merchant - request & QR check</h2>
    
    <button id="btnNewRequest">New request (QR)</button>
    <br><br>
    <canvas id="requestCanvas"></canvas>
    <br>
    <textarea id="requestJson" rows="5" style="width:100%" readonly></textarea>
    <hr>
    <textarea id="visaInput" rows="3" style="width:100%" placeholder="Insert / scan visaToken here..."></textarea>
    <button id="btnVerify">Visa check</button>
    <div id="merchantView"></div>
    <hr>
    <div id="reader"></div>

    <script src="js/merchant.js"></script>
    
</body>
</html>
